<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot and Annotate</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">

  </div>

  <script src="popup.js"></script>
</body>
</html>
